<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Game...</title>
<style>
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
#loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; }
#loading .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
#error { display: none; text-align: center; padding: 40px; }
#error h2 { color: #ef4444; }
</style>
</head>
<body>
<div id="loading">
<div class="spinner"></div>
<p>Loading game...</p>
</div>
<div id="error">
<h2>Failed to load game</h2>
<p id="error-msg"></p>
<button onclick="location.reload()" style="padding:10px 24px;background:#a855f7;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:12px;">Retry</button>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!id) {
    showError('No game ID provided');
    return;
  }
  // Try raw.githubusercontent.com first for proper content
  var url = 'https://raw.githubusercontent.com/gn-math/html/main/' + encodeURIComponent(id) + '.html';
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(html) {
      // Strip any tracking scripts from the source
      html = html.replace(/<script[^>]*googletagmanager[^>]*><\/script>/gi, '');
      html = html.replace(/<script>[^<]*gtag[^<]*<\/script>/gi, '');
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(e) {
      showError('Could not load game (ID: ' + id + '). ' + e.message);
    });

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error-msg').textContent = msg;
  }
})();
</script>
</body>
</html>

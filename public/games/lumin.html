<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games Hub</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }
    #games {
      width: 100%;
      min-height: 100vh;
    }
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: #0a0a0a;
      z-index: 1;
      pointer-events: none;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #ec4899;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading.hidden { display: none; }
  </style>
</head>
<body>
  <div class="loading" id="loader">
    <div class="spinner"></div>
    <p style="color:#888;font-size:14px;">Loading 700+ games…</p>
  </div>
  <div id="games"></div>
  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    try {
      Lumin.init({
        container: '#games',
        theme: 'dark'
      });
    } catch (e) {
      console.error('Lumin init failed:', e);
    }
    // Hide loader once games render
    const loader = document.getElementById('loader');
    const observer = new MutationObserver(() => {
      const games = document.getElementById('games');
      if (games && games.children.length > 0) {
        loader.classList.add('hidden');
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('games'), { childList: true, subtree: true });
    // Fallback: hide loader after 8 seconds
    setTimeout(() => loader.classList.add('hidden'), 8000);
  </script>
</body>
</html>
